<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:fragment="header-css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f8f9fa;
        }
        /* Hiệu ứng cho các Card sản phẩm */
        .product-card {
            transition: all 0.3s ease;
            border: none;
            border-radius: 12px;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1) !important;
        }
        /* Navbar tùy chỉnh */
        .navbar {
            background-color: #212529 !important;
            padding: 1rem 0;
        }
        .navbar-brand {
            font-weight: 700;
            letter-spacing: 1px;
        }
        .nav-link-custom {
            font-weight: 600;
            transition: color 0.2s;
        }
    </style>
</head>
<body>

<div th:fragment="navbar">
    <nav class="navbar navbar-expand-lg navbar-dark shadow-sm sticky-top">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="/store/products">
                <span class="me-2">👟</span> SPORT STORE
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="/store/products">Cửa hàng</a>
                    </li>
                </ul>

                <div class="d-flex align-items-center gap-3">
                    <a href="/cart" class="btn btn-warning position-relative fw-bold shadow-sm">
                        🛒 Giỏ hàng
                    </a>

                </div>
            </div>
        </div>
    </nav>
</div>

<div th:fragment="footer" class="container text-center mt-5 py-5 border-top">
    <div class="row">
        <div class="col-md-12">
            <h5 class="fw-bold mb-3">👟 SPORT STORE</h5>
            <p class="text-muted mb-0">© 2026 Cửa Hàng Đồ Thể Thao - Hệ thống Backend Spring Boot & MySQL</p>
            <p class="text-muted small">Cung cấp trang phục thể thao uy tín hàng đầu Việt Nam</p>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
