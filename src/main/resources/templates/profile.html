<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Hồ sơ người dùng</title>
    <th:block th:replace="~{fragments/layout :: header-css}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-5">
    <div class="row">
        <div class="col-lg-8 mx-auto">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h2 class="fw-bold">👤 Hồ sơ của tôi</h2>
                    <p class="text-muted mb-0">Quản lý thông tin tài khoản và mật khẩu.</p>
                </div>
                <div>
                    <a href="/orders" class="btn btn-outline-primary">Xem đơn hàng của tôi</a>
                </div>
            </div>

            <div th:if="${successMessage}" class="alert alert-success" th:text="${successMessage}"></div>
            <div th:if="${errorMessage}" class="alert alert-danger" th:text="${errorMessage}"></div>

            <div class="card shadow-sm mb-4">
                <div class="card-body">
                    <h5 class="card-title mb-4">Thông tin tài khoản</h5>
                    <form action="/profile" method="post">
                        <div class="mb-3">
                            <label class="form-label">Tài khoản</label>
                            <input type="text" class="form-control" th:value="${user.username}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" class="form-control" th:value="${user.email}" disabled>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Tên đầy đủ</label>
                            <input name="fullName" type="text" class="form-control" th:value="${user.fullName}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Số điện thoại</label>
                            <input name="phone" type="text" class="form-control" th:value="${user.phone}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Địa chỉ</label>
                            <input name="address" type="text" class="form-control" th:value="${user.address}">
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Ngày sinh</label>
                            <input name="dob" type="date" class="form-control" th:value="${user.dob}">
                        </div>
                        <button type="submit" class="btn btn-primary">Lưu thông tin</button>
                    </form>
                </div>
            </div>

            <div class="card shadow-sm">
                <div class="card-body">
                    <h5 class="card-title mb-4">Đổi mật khẩu</h5>
                    <form action="/profile/change-password" method="post">
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu hiện tại</label>
                            <input name="currentPassword" type="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Mật khẩu mới</label>
                            <input name="newPassword" type="password" class="form-control" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Xác nhận mật khẩu mới</label>
                            <input name="confirmPassword" type="password" class="form-control" required>
                        </div>
                        <button type="submit" class="btn btn-secondary">Đổi mật khẩu</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
