<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Đặt Hàng</title>
    <th:block th:replace="~{fragments/layout :: header-css}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-5">
    <div class="row g-5">

        <!-- Form thông tin -->
        <div class="col-md-7">
            <div class="card shadow-sm p-4">
                <h4 class="fw-bold mb-4">📦 Thông tin giao hàng</h4>
                <form th:action="@{/cart/order}" method="post">
                    <div class="mb-3">
                        <label class="form-label fw-bold">Họ và tên</label>
                        <input type="text" name="fullName" class="form-control" placeholder="Nguyễn Văn A" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Số điện thoại</label>
                        <input type="text" name="phone" class="form-control" placeholder="0912345678" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Địa chỉ</label>
                        <input type="text" name="address" class="form-control" placeholder="123 Đường ABC" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Thành phố</label>
                        <input type="text" name="city" class="form-control" placeholder="Hà Nội" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-bold">Ghi chú (tuỳ chọn)</label>
                        <textarea name="note" class="form-control" rows="2" placeholder="Ghi chú khi giao hàng..."></textarea>
                    </div>
                    <button type="submit" class="btn btn-success w-100 fw-bold py-2">
                        ✅ Xác nhận đặt hàng
                    </button>
                </form>
            </div>
        </div>

        <!-- Tóm tắt đơn hàng -->
        <div class="col-md-5">
            <div class="card shadow-sm p-4">
                <h4 class="fw-bold mb-4">🛒 Đơn hàng của bạn</h4>
                <div th:each="item : ${items}" class="d-flex justify-content-between mb-2">
                    <div>
                        <span th:text="${item.product.name}"></span>
                        <small class="text-muted d-block">Size: <span th:text="${item.productSize?.size}"></span> × <span th:text="${item.quantity}"></span></small>
                    </div>
                    <span class="fw-bold text-danger"
                          th:text="${#numbers.formatDecimal(item.product.price * item.quantity, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                    </span>
                </div>
                <hr>
                <div class="d-flex justify-content-between fw-bold">
                    <span>Tổng cộng</span>
                    <span class="text-danger"
                          th:text="${#numbers.formatDecimal(totalPrice, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">
                    </span>
                </div>
            </div>
        </div>

    </div>
</div>
</body>
</html>
