<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Admin Dashboard</title>
    <th:block th:replace="~{fragments/layout :: header-css}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-5">
    <h2 class="fw-bold mb-4">⚙️ Trang Quản Trị</h2>

    <!-- Thống kê -->
    <div class="row g-4 mb-5">
        <div class="col-md-4">
            <div class="card shadow-sm border-0 rounded-3 p-4 text-center">
                <div style="font-size:40px">👟</div>
                <h3 class="fw-bold text-primary mt-2" th:text="${totalProducts}">0</h3>
                <p class="text-muted mb-2">Sản phẩm</p>
                <a href="/admin/products" class="btn btn-primary btn-sm">Quản lý</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-0 rounded-3 p-4 text-center">
                <div style="font-size:40px">📦</div>
                <h3 class="fw-bold text-success mt-2" th:text="${totalOrders}">0</h3>
                <p class="text-muted mb-2">Đơn hàng</p>
                <a href="/admin/orders" class="btn btn-success btn-sm">Quản lý</a>
            </div>
        </div>
        <div class="col-md-4">
            <div class="card shadow-sm border-0 rounded-3 p-4 text-center">
                <div style="font-size:40px">🏷️</div>
                <h3 class="fw-bold text-warning mt-2" th:text="${totalCategories}">0</h3>
                <p class="text-muted mb-2">Danh mục</p>
                <a href="/admin/categories" class="btn btn-warning btn-sm">Quản lý</a>
            </div>
        </div>
    </div>

    <!-- Quick links -->
    <div class="card shadow-sm border-0 rounded-3 p-4">
        <h5 class="fw-bold mb-3">Thao tác nhanh</h5>
        <div class="d-flex gap-3 flex-wrap">
            <a href="/store/add" class="btn btn-outline-primary">+ Thêm sản phẩm</a>
            <a href="/orders" class="btn btn-outline-success">📋 Xem đơn hàng</a>
            <a href="/store/products" class="btn btn-outline-secondary">🏠 Ra trang chủ</a>
        </div>
    </div>
</div>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
