<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments/layout :: header-css">
    <title>Danh sách đơn hàng</title>
</head>

<body>

<div th:replace="fragments/layout :: navbar"></div>

<div class="container mt-4">

    <h2 class="mb-4 fw-bold">📦 Danh sách đơn hàng</h2>

    <table class="table table-bordered table-striped shadow-sm align-middle">

        <thead class="table-dark text-center">
        <tr>
            <th>Mã đơn</th>
            <th>Trạng thái</th>
            <th>Thao tác</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="order : ${orders}">

            <td class="text-muted small fw-bold">
                <span th:text="${order.id}"></span>
            </td>

            <td class="text-center">
                <span class="badge bg-primary text-uppercase" th:text="${order.status}"></span>
            </td>

            <td>
                <form th:action="@{'/orders/' + ${order.id} + '/status'}"
                      method="post"
                      class="d-flex gap-2 align-items-center mb-0">

                    <select name="newStatus"
                            class="form-select form-select-sm w-auto">
                        <option value="PENDING" th:selected="${order.status == 'PENDING'}">PENDING</option>
                        <option value="PAID" th:selected="${order.status == 'PAID'}">PAID</option>
                        <option value="SHIPPED" th:selected="${order.status == 'SHIPPED'}">SHIPPED</option>
                        <option value="COMPLETED" th:selected="${order.status == 'COMPLETED'}">COMPLETED</option>
                        <option value="CANCELLED" th:selected="${order.status == 'CANCELLED'}">CANCELLED</option>
                    </select>

                    <button type="submit"
                            class="btn btn-primary btn-sm">
                        Cập nhật
                    </button>

                    <a th:href="@{'/orders/chi-tiet/' + ${order.id}}"
                       class="btn btn-outline-info btn-sm fw-bold">
                        Chi tiết
                    </a>
                </form>

            </td>

        </tr>

        </tbody>

    </table>

</div>

<div th:replace="fragments/layout :: footer"></div>

</body>
</html>
