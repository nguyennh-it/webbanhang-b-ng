<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Yêu thích</title>
    <th:block th:replace="~{fragments/layout :: header-css}"></th:block>
    <meta name="_csrf" th:content="${_csrf?.token}"/>
    <meta name="_csrf_header" th:content="${_csrf?.headerName}"/>
    <style>
        .card-img-top { height: 200px; object-fit: cover; }
    </style>
</head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-5">
    <div class="text-center mb-4">
        <h2>❤️ Danh sách yêu thích</h2>
        <p class="text-muted">Các sản phẩm bạn đã lưu lại để xem sau.</p>
    </div>

    <div th:if="${#lists.isEmpty(wishlistItems)}" class="text-center my-5">
        <div class="p-5 bg-white rounded shadow-sm">
            <p class="h5 text-muted">Bạn chưa có sản phẩm yêu thích nào.</p>
            <a th:href="@{/store/products}" class="btn btn-primary mt-3">Khám phá sản phẩm</a>
        </div>
    </div>

    <div class="row row-cols-1 row-cols-md-3 g-4">
        <div class="col" th:each="w : ${wishlistItems}">
            <div class="card h-100 shadow-sm">
                <a th:href="@{/store/products/{id}(id=${w.product.id})}">
                    <img th:src="${w.product.imageUrl != null and !#strings.isEmpty(w.product.imageUrl)} ? ${w.product.imageUrl} : 'https://placehold.co/300x200?text=No+Image'"
                         class="card-img-top" alt="Ảnh sản phẩm"
                         onerror="this.src='https://placehold.co/300x200?text=No+Image'">
                </a>

                <div class="card-body d-flex flex-column">
                    <h5 class="card-title" th:text="${w.product.name}">Tên sản phẩm</h5>
                    <p class="text-muted small flex-grow-1" th:text="${w.product.description}">Mô tả</p>
                    <div class="d-flex justify-content-between align-items-center mt-3">
                        <div>
                            <p class="h5 text-danger mb-0" th:text="${#numbers.formatDecimal(w.product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'">0 VNĐ</p>
                            <small class="text-muted" th:text="${w.createdAt != null ? #temporals.format(w.createdAt, 'dd/MM/yyyy HH:mm') : '-'}">Ngày thêm</small>
                        </div>

                        <div class="d-flex flex-column align-items-end">
                            <form th:action="@{/wishlist/remove/{productId}(productId=${w.product.id})}" method="post">
                                <button type="submit" class="btn btn-outline-danger btn-sm">Xóa</button>
                            </form>
                            <a th:href="@{/store/products/{id}(id=${w.product.id})}" class="btn btn-primary btn-sm mt-2">Xem chi tiết</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
