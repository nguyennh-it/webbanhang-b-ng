<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Thêm Đồ Thể Thao Mới</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css">
</head>
<body class="bg-light">

<div class="container mt-5">
    <div class="card shadow p-4 col-md-8 mx-auto">
        <h2>Thêm Sản Phẩm Mới ⚽</h2>

        <!-- th:object="*{request}" để Thymeleaf biết bind vào ProductRequest -->
        <form th:action="@{/store/add}" th:object="${request}" method="post">
            <div class="mb-3">
                <label class="form-label">Tên sản phẩm:</label>
                <input type="text" th:field="*{name}" class="form-control" placeholder="Ví dụ: Giày đá bóng Nike">
                <div class="text-danger" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Mô tả:</label>
                <textarea th:field="*{description}" class="form-control" rows="3"></textarea>
            </div>
            <div class="mb-3">
                <label class="form-label">Giá tiền (VNĐ):</label>
                <input type="number" th:field="*{price}" class="form-control">
                <div class="text-danger" th:if="${#fields.hasErrors('price')}" th:errors="*{price}"></div>
            </div>
            <div class="mb-3">
                <label class="form-label">Số lượng:</label>
                <input type="number" th:field="*{stock}" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label">Danh mục:</label>
                <select th:field="*{categoryId}" class="form-select">
                    <option value="">-- Chọn danh mục --</option>
                    <option th:each="cat : ${categories}"
                            th:value="${cat.id}"
                            th:text="${cat.name}">
                    </option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label">Link ảnh:</label>
                <input type="text" th:field="*{imageUrl}" class="form-control" placeholder="https://...">
            </div>
            <div class="mb-3">
                <label class="form-label">Kích cỡ có sẵn:</label>
                <div class="form-check">
                    <!-- Sử dụng th:field="*{sizes}" để tự động bind vào List trong ProductRequest -->
                    <input class="form-check-input" type="checkbox" th:field="*{sizes}" value="S" id="sizeS">
                    <label class="form-check-label" for="sizeS">S (Nhỏ)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" th:field="*{sizes}" value="M" id="sizeM">
                    <label class="form-check-label" for="sizeM">M (Vừa)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" th:field="*{sizes}" value="L" id="sizeL">
                    <label class="form-check-label" for="sizeL">L (Lớn)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" th:field="*{sizes}" value="XL" id="sizeXL">
                    <label class="form-check-label" for="sizeXL">XL (Rất lớn)</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" th:field="*{sizes}" value="40" id="size40">
                    <label class="form-check-label" for="size40">40</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" th:field="*{sizes}" value="41" id="size41">
                    <label class="form-check-label" for="size41">41</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" th:field="*{sizes}" value="42" id="size42">
                    <label class="form-check-label" for="size42">42</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" th:field="*{sizes}" value="43" id="size43">
                    <label class="form-check-label" for="size43">43</label>
                </div>
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" th:field="*{sizes}" value="44" id="size44">
                    <label class="form-check-label" for="size44">44</label>
                </div>
            </div>

            <button type="submit" class="btn btn-success w-100">Lưu Sản Phẩm</button>
            <a href="/store/products" class="btn btn-secondary w-100 mt-2">Quay lại danh sách</a>
        </form>
    </div>
</div>

</body>
</html>
