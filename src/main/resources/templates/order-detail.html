<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: header-css}">
    <title>Chi tiết đơn hàng</title>
</head>
<body>
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-5">
    <div class="card shadow-sm">
        <div class="card-header bg-dark text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0">📦 Chi tiết đơn hàng</h4>
            <a href="/orders" class="btn btn-outline-light btn-sm">Quay lại danh sách</a>
        </div>
        <div class="card-body">
            <div class="row mb-4" th:if="${order != null}">
                <div class="col-md-6">
                    <p><strong>Mã đơn hàng:</strong> <span th:text="${order.id}" class="text-primary fw-bold"></span></p>
                    <p><strong>Trạng thái:</strong>
                        <span th:text="${order.status}" class="badge bg-info text-uppercase"></span>
                        <td class="text-center small">
                            <span th:text="${#dates.format(order.createdAt, 'dd/MM/yyyy HH:mm')}"></span>
                        </td>
                    </p>
                </div>
            </div>

            <div class="table-responsive">
                <table class="table table-bordered table-hover align-middle">
                    <thead class="table-secondary text-center">
                    <tr>
                        <th>STT</th>
                        <th>Sản phẩm</th>
                        <th>Kích cỡ (Size)</th>
                        <th>Số lượng</th>
                        <th>Đơn giá</th>
                        <th>Thành tiền</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="detail, iterStat : ${orderDetails}">
                        <td class="text-center" th:text="${iterStat.count}">1</td>

                        <td>
                            <a th:href="@{/products/{id}(id=${detail.product.id})}"
                               th:text="${detail.product.name}"
                               class="fw-bold text-primary text-decoration-none product-detail-link">
                                Tên sản phẩm
                            </a>
                        </td>

                        <td class="text-center fw-bold text-success" th:text="${detail.productSize != null ? detail.productSize.size : 'N/A'}">M</td>
                        <td class="text-center" th:text="${detail.quantity}">1</td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(detail.price, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">1,000 VNĐ</td>
                        <td class="text-end fw-bold text-danger" th:text="${#numbers.formatDecimal(detail.price * detail.quantity, 0, 'COMMA', 0, 'POINT') + ' VNĐ'}">1,000 VNĐ</td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(orderDetails)}">
                        <td colspan="6" class="text-center text-muted">Không có chi tiết sản phẩm nào cho đơn hàng này.</td>
                    </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<style>
    .product-detail-link:hover {
        color: #0a58ca !important;
        text-decoration: underline !important;
    }
</style>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
