<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="${product.name}">Chi tiết sản phẩm</title>
  <th:block th:replace="~{fragments/layout :: header-css}"></th:block>
</head>
<body class="bg-light">
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-5">
  <div class="row g-5">

    <div class="col-md-6">
      <img th:src="${product.imageUrl != null and !#strings.isEmpty(product.imageUrl)}
                         ? ${product.imageUrl}
                         : 'https://placehold.co/600x400?text=No+Image'"
           class="img-fluid rounded shadow"
           onerror="this.src='https://placehold.co/600x400?text=No+Image'"
           alt="Ảnh sản phẩm">
    </div>

    <div class="col-md-6">
      <h2 class="fw-bold" th:text="${product.name}">Tên sản phẩm</h2>

      <div th:if="${param.error}" class="alert alert-danger alert-dismissible fade show fw-bold mt-2" role="alert">
        ❌ <span th:text="${param.error}">Thông báo lỗi hết hàng</span>
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
      </div>

      <p class="text-muted mt-2"
         th:text="${product.description != null ? product.description : 'Chưa có mô tả.'}">
        Mô tả
      </p>

      <h3 class="text-danger fw-bold mt-3"
          th:text="${product.price != null}
                         ? ${#numbers.formatDecimal(product.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'
                         : 'Liên hệ'">
        0 VNĐ
      </h3>

      <form th:action="@{/cart/add/{id}(id=${product.id})}" method="post" class="mt-4">
        <select name="sizeId" id="sizeSelect" required class="form-select mb-3">
          <option value="" selected disabled>-- Vui lòng chọn Size --</option>
          <option th:each="s : ${product.sizes}"
                  th:value="${s.id}"
                  th:text="${s.size + ' - Còn ' + s.stock}">
          </option>
        </select>
        <div class="mb-4">
          <label for="quantity" class="form-label fw-bold">Số lượng:</label>
          <div class="input-group" style="max-width: 140px;">
            <button class="btn btn-outline-secondary" type="button" onclick="changeQty(-1)">-</button>
            <input type="number" id="quantity" name="quantity" class="form-control text-center fw-bold" value="1" min="1" max="99" required>
            <button class="btn btn-outline-secondary" type="button" onclick="changeQty(1)">+</button>
          </div>
        </div>
        <button type="submit" id="addToCartBtn" class="btn btn-primary w-100 fw-bold py-2">
          Thêm vào giỏ 🛒
        </button>
      </form>

      <a href="/store/products" class="btn btn-outline-secondary mt-3">
        ← Quay lại danh sách
      </a>
    </div>
  </div>
  <div class="row mt-5">
    <div class="col-12">
      <hr/>
      <h4 class="fw-bold mb-4">Đánh giá sản phẩm
        <span class="text-muted fs-6">(<span th:text="${#lists.size(reviews)}">0</span> đánh giá)</span>
      </h4>

      <p th:if="${#lists.isEmpty(reviews)}" class="text-muted">Chưa có đánh giá nào.</p>

      <div th:each="review : ${reviews}" class="border-bottom pb-3 mb-3">
        <div class="d-flex justify-content-between">
          <strong th:text="${review.reviewerName}">Tên</strong>
          <small class="text-muted" th:text="${#temporals.format(review.createdAt, 'dd/MM/yyyy')}"></small>
        </div>
        <div>
          <span th:each="i : ${#numbers.sequence(1,5)}"
                th:style="${i <= review.rating} ? 'color:#f5a623' : 'color:#ddd'">★</span>
        </div>
        <p class="mt-1 mb-0" th:text="${review.comment}"></p>
      </div>

      <div class="mt-4">
        <h5 class="fw-bold">Viết đánh giá</h5>
        <form th:action="@{/store/products/{id}/reviews(id=${product.id})}"
              th:object="${reviewRequest}" method="post">

          <div class="mb-2">
            <input type="text" th:field="*{reviewerName}"
                   class="form-control" placeholder="Tên của bạn" required/>
          </div>

          <div class="mb-2">
            <div class="d-flex gap-1 fs-4" id="starSelector">
              <span th:each="i : ${#numbers.sequence(1,5)}"
                    th:data-value="${i}"
                    style="cursor:pointer; color:#ddd;" class="star-btn">★</span>
            </div>
            <input type="hidden" th:field="*{rating}" id="ratingInput" required/>
          </div>

          <div class="mb-2">
            <textarea th:field="*{comment}" class="form-control"
                      rows="3" placeholder="Nhận xét của bạn..." required></textarea>
          </div>

          <button type="submit" class="btn btn-primary">Gửi đánh giá</button>
        </form>
      </div>

    </div>
  </div>
</div>

<script>
  function changeQty(amount) {
    const qtyInput = document.getElementById('quantity');
    let currentQty = parseInt(qtyInput.value) || 1;
    currentQty += amount;

    if (currentQty < 1) currentQty = 1;
    if (currentQty > 99) currentQty = 99; // Giới hạn mua tối đa 99 sản phẩm

    qtyInput.value = currentQty;
  }
  document.querySelectorAll('.star-btn').forEach(star => {
    star.addEventListener('mouseover', function () {
      const val = this.dataset.value;
      document.querySelectorAll('.star-btn').forEach(s => {
        s.style.color = s.dataset.value <= val ? '#f5a623' : '#ddd';
      });
    });
    star.addEventListener('click', function () {
      document.getElementById('ratingInput').value = this.dataset.value;
    });
  });
  document.getElementById('starSelector').addEventListener('mouseleave', function () {
    const selected = document.getElementById('ratingInput').value;
    document.querySelectorAll('.star-btn').forEach(s => {
      s.style.color = selected && s.dataset.value <= selected ? '#f5a623' : '#ddd';
    });
  });

  // 🔥 ĐÃ BỔ SUNG: Logic JavaScript kiểm tra text của Option để khóa nút mua hàng ngay lập tức
  const sizeSelect = document.getElementById('sizeSelect');
  const addToCartBtn = document.getElementById('addToCartBtn');

  if(sizeSelect && addToCartBtn) {
    sizeSelect.addEventListener('change', function() {
      const selectedText = this.options[this.selectedIndex].text;

      // Nếu chuỗi chứa "Còn 0" thì mờ nút và chuyển sang màu đỏ báo Hết hàng
      if (selectedText.includes("Còn 0")) {
        addToCartBtn.disabled = true;
        addToCartBtn.innerText = "Đã Hết";
        addToCartBtn.className = "btn btn-danger w-100 fw-bold py-2";
      } else {
        addToCartBtn.disabled = false;
        addToCartBtn.innerText = "Thêm vào giỏ 🛒";
        addToCartBtn.className = "btn btn-primary w-100 fw-bold py-2";
      }
    });
  }
</script>

<div th:replace="~{fragments/layout :: footer}"></div>
</body>
</html>
