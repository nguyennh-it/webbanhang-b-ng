
<head>
    <title>Sửa Thông Tin Sản Phẩm</title>
    <!-- 1. Nhúng CSS và Meta dùng chung -->
    <th:block th:replace="~{fragments/layout :: header-css}"></th:block>
</head>
<body class="bg-light">

<!-- 2. Nhúng thanh Menu chung -->
<div th:replace="~{fragments/layout :: navbar}"></div>

<div class="container mt-5">
    <!-- Căn giữa form với col-md-6 để giao diện cân đối -->
    <div class="card shadow p-4 col-md-6 mx-auto">
        <h2>Chỉnh sửa sản phẩm 📝</h2>

        <!-- Giữ nguyên logic th:action kèm ID của bạn -->
        <form th:action="@{/store/edit/{id}(id=${product.id})}" method="post">
            <div class="mb-3">
                <label class="form-label">Tên sản phẩm:</label>
                <input type="text" name="name" class="form-control" th:value="${product.name}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Giá tiền:</label>
                <input type="number" name="price" class="form-control" th:value="${product.price}" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Link ảnh:</label>
                <input type="text" name="imageUrl" class="form-control" th:value="${product.imageUrl}" placeholder="https://...">
            </div>

            <button type="submit" class="btn btn-primary w-100">Cập Nhật Thay Đổi</button>
            <a href="/store/products" class="btn btn-secondary w-100 mt-2">Hủy bỏ</a>
        </form>
    </div>
</div>

<!-- 3. Nhúng Chân trang chung -->
<div th:replace="~{fragments/layout :: footer}"></div>

</body>
</html>
